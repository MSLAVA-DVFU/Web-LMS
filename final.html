<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="task">
        

        <!-- Рисунок с геометрической фигурой -->
        <div class="figure-container" id="figureContainer">
            <!-- сюда будет вставлена картинка -->
        </div>

        <!-- Блок ввода данных -->
        <div class="input">
            <!-- Поле со списком для выбора типа входных данных и кнопка Показать -->
            <div style="margin-bottom: 15px;">
                <label>Тип входных данных: </label>
                <select id="dataTypeSelect">
                    <option value="side">Основания и боковая сторона</option>
                    <option value="angle">Основания и угол между основанием и боковой стороной</option>
                </select>
                <button type="button" id="showBtn">Показать</button>
            </div>

            <!-- Динамические поля для ввода -->
            <div id="inputFields">
                <!-- заполняются через JS -->
            </div>

            <!-- SELECT multiple для выбора вычисляемых характеристик -->
            <div class="feature-group">
                <p id="featuresLabel">Выберите характеристики для вычисления:</p>
                <select id="featuresSelect" multiple size="3" style="min-width: 250px; padding: 5px;">
                    <option value="diagonal">Диагонали</option>
                    <option value="height">Высота</option>
                    <option value="angleDiag">Угол между диагоналями</option>
                </select>
                <div id="selectErrorMsg" class="error-message"></div>
            </div>

            <!-- Кнопки Вычислить и Очистить -->
            <p>
                <button type="button" id="calculateBtn">Вычислить</button>
                <button type="button" id="clearBtn">Очистить</button>
            </p>
        </div>

        <!-- Блок вывода результатов (с серым фоном) -->
        <div id="output">
            <p>Результат:</p>
            <div id="resultsList">—</div>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
